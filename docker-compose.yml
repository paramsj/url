version: "3.9"

services:

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always

    ports:
      - "8080:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - app1
      - app2
      - app3

  app1:
    build: .
    container_name: app1
    restart: always

    env_file:
      - .env

    environment:
      PORT: 3000
      SERVER_ID: app1
      REDIS_URL: redis://redis:6379
      BASE_URL: http://localhost:8080

    depends_on:
      - redis

  app2:
    build: .
    container_name: app2
    restart: always

    env_file:
      - .env

    environment:
      PORT: 3000
      SERVER_ID: app2
      REDIS_URL: redis://redis:6379
      BASE_URL: http://localhost:8080

    depends_on:
      - redis

  app3:
    build: .
    container_name: app3
    restart: always

    env_file:
      - .env

    environment:
      PORT: 3000
      SERVER_ID: app3
      REDIS_URL: redis://redis:6379
      BASE_URL: http://localhost:8080

    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always

  click-worker:
    build: .
    container_name: click-worker
    restart: always

    command: npm run start:click-worker
    
    env_file:
      - .env

    environment:
      REDIS_URL: redis://redis:6379

    depends_on:
      - redis

  expiry-worker:
    build: .
    container_name: expiry-worker
    restart: always

    command: npm run start:expiry-worker

    env_file:
      - .env

    environment:
      REDIS_URL: redis://redis:6379

    depends_on:
      - redis
